name: Sync Issues to Private Repo

on:
  schedule:
    - cron: '0 12 * * *'  # 4am PST
    - cron: '0 20 * * *'  # 12pm PST
    - cron: '0 2 * * *'   # 6pm PST
  workflow_dispatch: # allow manual runs

permissions:
  contents: write  # needed to update .github/last_sync
  issues: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PRIVATE_REPO_PAT }}
          script: |
            const fs = require('fs');
            const private_owner = context.repo.owner;
            const private_repo = 'typed_graph';
            const sync_file = '.github/last_sync';

            // Read last sync timestamp, default to epoch if first run
            let since = '1970-01-01T00:00:00Z';
            if (fs.existsSync(sync_file)) {
              since = fs.readFileSync(sync_file, 'utf8').trim();
            }
            const now = new Date().toISOString();

            // Fetch issues updated since last run
            const updated_issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              since,
              per_page: 100
            });

            if (updated_issues.length === 0) {
              console.log('No new or updated issues since', since);
            }

            async function ensure_label() {
              try {
                await github.rest.issues.getLabel({
                  owner: private_owner,
                  repo: private_repo,
                  name: 'tgi'
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: private_owner,
                  repo: private_repo,
                  name: 'tgi',
                  color: '0075ca',
                  description: 'Reported via typed_graph_issues'
                });
              }
            }

            async function find_mirrored_issue(issue_url) {
              const result = await github.rest.search.issuesAndPullRequests({
                q: `${issue_url} repo:${private_owner}/${private_repo} is:issue in:body`
              });
              return result.data.total_count > 0 ? result.data.items[0] : null;
            }

            await ensure_label();

            for (const issue of updated_issues) {
              // Skip pull requests
              if (issue.pull_request) continue;

              const body = [
                `<!-- public_issue:${issue.html_url} -->`,
                issue.body || ''
              ].join('\n');

              const mirrored = await find_mirrored_issue(issue.html_url);

              if (!mirrored) {
                console.log(`Creating mirror for issue #${issue.number}: ${issue.title}`);
                await github.rest.issues.create({
                  owner: private_owner,
                  repo: private_repo,
                  title: issue.title,
                  body,
                  labels: ['tgi', ...issue.labels.map(l => l.name)]
                });
              } else {
                console.log(`Updating mirror for issue #${issue.number}: ${issue.title}`);
                await github.rest.issues.update({
                  owner: private_owner,
                  repo: private_repo,
                  issue_number: mirrored.number,
                  title: issue.title,
                  body,
                  state: issue.state,
                  labels: ['tgi', ...issue.labels.map(l => l.name)]
                });
              }

              // Sync comments updated since last run
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                since,
                per_page: 100
              });

              if (mirrored) {
                for (const comment of comments) {
                  await github.rest.issues.createComment({
                    owner: private_owner,
                    repo: private_repo,
                    issue_number: mirrored.number,
                    body: [
                      `> [@${comment.user.login}](${comment.user.html_url}):`,
                      '',
                      comment.body
                    ].join('\n')
                  });
                }
              }
            }

            // Write updated timestamp
            fs.writeFileSync(sync_file, now);

      - name: Commit last sync timestamp
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/last_sync
          git diff --staged --quiet || git commit -m "chore: update last sync timestamp"
          git push